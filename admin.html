<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottery Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#fff;
border-radius:20px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
text-align:center;
font-size:42px;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:8px;
color:#111827;
}

.sub{
text-align:center;
color:#6b7280;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:12px;
margin-bottom:12px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.95;
}

#adminPanel{
display:none;
}

.msg{
margin-top:15px;
text-align:center;
font-size:14px;
}

.success{
color:#16a34a;
}

.error{
color:#dc2626;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">⚙️</div>

<h2>Admin Dashboard</h2>

<div class="sub">WhatsApp Number Control Panel</div>

<div id="loginBox">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<div id="loginMsg" class="msg"></div>

</div>

<div id="adminPanel">

<input
type="text"
id="wa"
placeholder="Enter WhatsApp Number">

<button onclick="saveWA()">
Update Number
</button>

<div id="saveMsg" class="msg"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyCuVIuPY7aJMN0ym2ulvIUnAw72Gmyz0_w",
authDomain: "lottery-3aa0e.firebaseapp.com",
databaseURL: "https://lottery-3aa0e-default-rtdb.firebaseio.com",
projectId: "lottery-3aa0e",
storageBucket: "lottery-3aa0e.firebasestorage.app",
messagingSenderId: "103186730745",
appId: "1:103186730745:web:c23627f2261fbd5d6adc28"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PASSWORD = "12345";

window.login = function(){

const pass =
document.getElementById("password")
.value
.trim();

if(pass === PASSWORD){

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("adminPanel")
.style.display = "block";

}else{

document.getElementById("loginMsg")
.innerHTML =
'<span class="error">Wrong Password</span>';

}

};

window.saveWA = function(){

const number =
document.getElementById("wa")
.value
.trim();

if(number === ""){

alert("Enter WhatsApp Number");

return;

}

set(
ref(db,"site/whatsapp"),
number
)

.then(()=>{

document.getElementById("saveMsg")
.innerHTML =
'<span class="success">WhatsApp Number Updated Successfully</span>';

})

.catch((err)=>{

alert(err);

});

};

</script>

</body>
</html>

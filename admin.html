<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottery Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#ffffff;
border-radius:24px;
padding:35px;
box-shadow:0 25px 60px rgba(0,0,0,.25);
}

.logo{
width:70px;
height:70px;
border-radius:18px;
background:#22c55e;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
margin:auto;
color:#fff;
}

h1{
text-align:center;
font-size:26px;
margin-top:15px;
color:#111827;
}

.sub{
text-align:center;
color:#6b7280;
margin-top:6px;
margin-bottom:25px;
font-size:14px;
}

input{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:12px;
outline:none;
font-size:15px;
margin-top:12px;
}

input:focus{
border-color:#22c55e;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:.95;
}

#adminPanel{
display:none;
}

.success{
margin-top:15px;
padding:12px;
background:#dcfce7;
color:#166534;
border-radius:10px;
text-align:center;
font-size:14px;
}

.error{
margin-top:12px;
color:red;
text-align:center;
font-size:14px;
}

.badge{
margin-top:18px;
text-align:center;
color:#6b7280;
font-size:13px;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">⚙️</div>

<h1>Admin Dashboard</h1>

<div class="sub">
Lottery WhatsApp Control Panel
</div>

<!-- LOGIN -->

<div id="loginBox">

<input
type="password"
id="password"
placeholder="Enter Admin Password">

<button onclick="login()">
Login
</button>

<div id="error" class="error"></div>

</div>

<!-- PANEL -->

<div id="adminPanel">

<input
type="text"
id="wa"
placeholder="Enter WhatsApp Number">

<button onclick="saveWA()">
Update WhatsApp Number
</button>

<div id="msg"></div>

<div class="badge">
Secure Control Panel
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
databaseURL: "YOUR_DATABASE_URL",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_SENDER_ID",
appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASSWORD = "12345";

window.login = function(){

const pass =
document.getElementById("password")
.value
.trim();

if(pass === ADMIN_PASSWORD){

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("adminPanel")
.style.display = "block";

}else{

document.getElementById("error")
.innerHTML = "Wrong Password";

}

};

window.saveWA = function(){

const number =
document.getElementById("wa")
.value
.trim();

if(number === ""){

alert("Enter WhatsApp Number");

return;

}

set(
ref(db,"site/whatsapp"),
number
)

.then(()=>{

document.getElementById("msg")
.innerHTML =
'<div class="success">WhatsApp Number Updated Successfully</div>';

})

.catch((err)=>{

alert(err);

});

};

</script>

</body>
</html>
